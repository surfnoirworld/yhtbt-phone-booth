<text class="ts" x="170" y="459" text-anchor="middle" dominant-baseline="central">Caller session memory</text>
</g>

<g class="c-blue">
<rect x="410" y="420" width="190" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="505" y="441" text-anchor="middle" dominant-baseline="central">Gemini Live API</text>
<text class="ts" x="505" y="459" text-anchor="middle" dominant-baseline="central">Native audio model</text>
</g>

<line x1="505" y1="476" x2="505" y2="510" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber">
<rect x="350" y="510" width="310" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="505" y="531" text-anchor="middle" dominant-baseline="central">Aza Fre — voice agent</text>
<text class="ts" x="505" y="549" text-anchor="middle" dominant-baseline="central">Character + navigation + session context</text>
</g>

<g class="c-coral">
