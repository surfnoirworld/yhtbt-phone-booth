<rect x="60" y="270" width="560" height="310" rx="20" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
<text class="th" x="340" y="296" text-anchor="middle">Google Cloud</text>

<g class="c-purple">
<rect x="190" y="310" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="331" text-anchor="middle" dominant-baseline="central">Cloud Run</text>
