<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: "Helvetica Neue", Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
  .arr { stroke: #5F5E5A; stroke-width: 1.5; }

  /* Gray */
  .c-gray rect { fill: #F1EFE8; stroke: #B4B2A9; }
  .c-gray .th { fill: #2C2C2A; }
  .c-gray .ts { fill: #5F5E5A; }

  /* Teal */
  .c-teal rect { fill: #E1F5EE; stroke: #5DCAA5; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  /* Purple */
  .c-purple rect { fill: #EEEDFE; stroke: #AFA9EC; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  /* Coral */
  .c-coral rect { fill: #FAECE7; stroke: #F0997B; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  /* Blue */
  .c-blue rect { fill: #E6F1FB; stroke: #85B7EB; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }

  /* Amber */
  .c-amber rect { fill: #FAEEDA; stroke: #FAC775; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th" x="340" y="30" text-anchor="middle">YHTBT Phone Booth</text>
<text class="ts" x="340" y="48" text-anchor="middle">youhadtobethere.life voice agent architecture</text>

<g class="c-gray">
<rect x="220" y="75" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="96" text-anchor="middle" dominant-baseline="central">Caller's browser</text>
<text class="ts" x="340" y="114" text-anchor="middle" dominant-baseline="central">Mic capture + audio playback</text>
</g>

<line x1="340" y1="131" x2="340" y2="160" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="170" y="160" width="340" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="181" text-anchor="middle" dominant-baseline="central">youhadtobethere.life</text>
<text class="ts" x="340" y="199" text-anchor="middle" dominant-baseline="central">Base44 phone directory + LiveCallManager</text>
</g>

<g class="c-gray">
<rect x="40" y="168" width="110" height="40" rx="6" stroke-width="0.5"/>
